# Stage C: UV spectral task (includes all prior tasks)
# Full training config
stage: stage_c
tasks: [mu, alpha, ir_spectrum, raman_spectrum, uv_spectrum]
spectral_tasks: [ir, raman, uv]
init_from_stage_b: true
activity_gate:
  type: simple
model:
  feature_dim: 128
  mto_hidden_dim: 64
  readout_hidden_dim: 128
  spectral_hidden_dim: 256
  maxl: 3
  num_block: 3
  rc: 5.0
train:
  epochs: 100
  batch_size: 8
  lr: 0.0003
  diversity_weight: 0.001
  entropy_weight: 0.001
  theta_start: 0.5
  theta_end: 0.03
  theta_epochs: 30
task_weights:
  mu: 1.0
  alpha: 1.0
  ir: 0.3
  raman: 0.3
  uv: 0.1
